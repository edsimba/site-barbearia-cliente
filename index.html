<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduardo Barbearia - Clube Score</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* CORES EXTRAÍDAS DIRETAMENTE DA SUA LOGO */
            --primary: #a08a58; /* Dourado exato da logo */
            --primary-hover: #8f794b;
            --text-main: #0d182a; /* Azul marinho escuro do texto da logo */
            --card-vip: linear-gradient(135deg, #1f3455 0%, #0d182a 100%); /* Degrade Azul Marinho */
            
            --bg-body: #f4f6f9;
            --bg-card: #ffffff;
            --input-bg: #f9fafb;
            --text-muted: #7f8c8d;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .box { 
            background: var(--bg-card); 
            padding: 40px 30px; 
            border-radius: 24px; 
            max-width: 420px; 
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        /* Classes para a Logo */
        .logo {
            max-width: 170px;
            width: 100%;
            display: block;
            margin: 0 auto 15px auto;
        }

        .logo-painel {
            max-width: 130px;
            width: 100%;
            display: block;
            margin: 0 auto 20px auto;
        }

        h2 { 
            font-weight: 700; 
            margin-bottom: 25px; 
            color: var(--text-main); 
            text-align: center; 
            font-size: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: 0.3s;
        }

        input, select { 
            width: 100%; 
            padding: 16px 16px 16px 45px; 
            border-radius: 14px; 
            border: 2px solid #eaeff5; 
            background-color: var(--input-bg);
            color: var(--text-main);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            appearance: none; 
        }

        select { padding-left: 16px; cursor: pointer; } 
        
        input:focus, select:focus { 
            border-color: var(--primary); 
            background-color: #fff; 
            box-shadow: 0 0 0 4px rgba(160, 138, 88, 0.15);
        }

        .input-group input:focus + i { color: var(--primary); }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-left: 5px;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 15px;
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(160, 138, 88, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        button:hover { 
            background: var(--primary-hover); 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(160, 138, 88, 0.4);
        }

        button:active { transform: translateY(0); }

        /* Cartão VIP (Score) */
        .score-card { 
            background: var(--card-vip); 
            padding: 30px 25px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            color: #fff;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(13, 24, 42, 0.2);
        }

        .score-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(160, 138, 88, 0.15) 0%, rgba(0,0,0,0) 70%);
            transform: rotate(30deg); pointer-events: none;
        }

        .score-card.active-resgate {
            background: linear-gradient(135deg, #0f3d24 0%, #062112 100%);
        }
        
        .score-card p.subtitle { color: #a5b1c2; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .score-card h1 { margin: 0; font-size: 42px; font-weight: 700; color: var(--primary); letter-spacing: -1px; }
        .score-card p#nome-display { color: #f1f2f6; font-weight: 400; margin-top: 15px; font-size: 14px; }

        .btn-usar-saldo {
            background: rgba(160, 138, 88, 0.15);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 15px;
            display: inline-block;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .btn-usar-saldo:hover { background: var(--primary); color: #fff; }
        .btn-usar-saldo.cancelar { background: rgba(231, 76, 60, 0.1); color: var(--danger); border-color: var(--danger); }
        .btn-usar-saldo.cancelar:hover { background: var(--danger); color: #fff; }

        .hidden { display: none !important; }

        /* Animação */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Comprovante */
        .nota-fiscal { 
            background: #fff; 
            padding: 30px 25px; 
            border: 2px dashed #dcdde1; 
            border-radius: 16px;
            text-align: left; 
            margin-top: 20px;
            position: relative;
        }

        .nota-fiscal::before, .nota-fiscal::after {
            content: ''; position: absolute; top: -10px; width: 20px; height: 20px;
            background: var(--bg-card); border-radius: 50%;
        }
        .nota-fiscal::before { left: -10px; border-right: 2px dashed #dcdde1; }
        .nota-fiscal::after { right: -10px; border-left: 2px dashed #dcdde1; }

        .nota-fiscal h3 { text-align: center; color: var(--success); margin-top: 0; margin-bottom: 20px; font-size: 18px; }
        
        .ticket-row { display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding: 12px 0; font-size: 14px; }
        .ticket-row span:first-child { color: var(--text-muted); font-weight: 500; }
        .ticket-row span:last-child { color: var(--text-main); font-weight: 600; text-align: right; }

        .link-text { cursor: pointer; color: var(--text-muted); font-size: 14px; text-align: center; margin-top: 20px; transition: 0.3s; font-weight: 500; }
        .link-text:hover { color: var(--primary); }

        .btn-logout {
            background: transparent; color: var(--danger); border: 2px solid rgba(231, 76, 60, 0.2); box-shadow: none;
        }
        .btn-logout:hover { background: var(--danger); color: #fff; box-shadow: 0 8px 20px rgba(231, 76, 60, 0.2); }

    </style>
</head>
<body>

<div class="box">
    <!-- TELA DE LOGIN -->
    <div id="tela-login" class="fade-in">
        <!-- Logo Inserida Aqui -->
        <img src="logo.jpg" alt="Eduardo Barbearia" class="logo">
        <h2 style="margin-top: -10px;">Acessar Conta</h2>
        
        <div class="input-group">
            <input type="email" id="login-email" placeholder="Seu e-mail">
            <i class="fa-regular fa-envelope"></i>
        </div>
        
        <div class="input-group">
            <input type="password" id="login-senha" placeholder="Sua senha">
            <i class="fa-solid fa-lock"></i>
        </div>

        <button onclick="logar()">Entrar <i class="fa-solid fa-arrow-right"></i></button>
        <p class="link-text" onclick="irParaCadastro()">Não tem uma conta? <b>Crie agora</b></p>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro" class="hidden fade-in">
        <!-- Logo Inserida Aqui -->
        <img src="logo.jpg" alt="Eduardo Barbearia" class="logo">
        <h2 style="margin-top: -10px;">Criar Conta</h2>
        
        <div class="input-group">
            <input type="text" id="cad-nome" placeholder="Nome completo">
            <i class="fa-regular fa-user"></i>
        </div>
        
        <div class="input-group">
            <input type="email" id="cad-email" placeholder="E-mail">
            <i class="fa-regular fa-envelope"></i>
        </div>
        
        <div class="input-group">
            <input type="password" id="cad-senha" placeholder="Crie uma senha">
            <i class="fa-solid fa-lock"></i>
        </div>

        <div class="input-group">
            <input type="tel" id="cad-whatsapp" placeholder="(XX) XXXXX-XXXX" maxlength="15">
            <i class="fa-brands fa-whatsapp"></i>
        </div>

        <button onclick="finalizarCadastro()">Finalizar Cadastro</button>
        <p class="link-text" onclick="irParaLogin()"><i class="fa-solid fa-arrow-left"></i> Voltar ao login</p>
    </div>

    <!-- TELA PAINEL / AGENDAMENTO -->
    <div id="tela-painel" class="hidden fade-in">
        
        <!-- Logo Inserida Aqui -->
        <img src="logo.jpg" alt="Eduardo Barbearia" class="logo-painel">

        <!-- Cartão Score -->
        <div class="score-card" id="card-saldo">
            <p class="subtitle">Saldo Clube Score</p>
            <h1 id="saldo-texto">R$ 0,00</h1>
            <div id="btn-resgate" class="btn-usar-saldo" onclick="toggleResgate()"><i class="fa-solid fa-gift"></i> USAR NO AGENDAMENTO</div>
            <p id="nome-display"></p>
        </div>

        <div id="area-agendamento">
            <div style="margin-bottom: 15px;">
                <label>Data Disponível</label>
                <select id="select-domingo" onchange="bloquearHorariosOcupados()"></select>
            </div>

            <div style="margin-bottom: 15px;">
                <label>Qual serviço deseja realizar?</label>
                <select id="select-servico">
                    <option value="">Selecione...</option>
                    <option value="Social|20|0.05">Social - R$ 20,00 (+5¢ score)</option>
                    <option value="Degradê|25|0.07">Degradê - R$ 25,00 (+7¢ score)</option>
                    <option value="Social + Barba|30|0.10">Social + Barba - R$ 30,00 (+10¢ score)</option>
                    <option value="Combo Completo|35|0.13">Combo Completo - R$ 35,00 (+13¢ score)</option>
                    <option value="Degradê + Barba|35|0.13">Degradê + Barba - R$ 35,00 (+13¢ score)</option>
                    <option value="Barba|10|0.02">Barba - R$ 10,00 (+2¢ score)</option>
                    <option value="Sobrancelha|10|0.02">Sobrancelha - R$ 10,00 (+2¢ score)</option>
                    <option value="Pezinho|10|0.02">Pezinho - R$ 10,00 (+2¢ score)</option>
                    <option value="Luzes|60|0.30">Luzes - R$ 60,00 (+30¢ score)</option>
                    <option value="Tintura|30|0.10">Tintura - R$ 30,00 (+10¢ score)</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label>Horário Preferencial</label>
                <select id="select-horario">
                    <option value="">Selecione...</option>
                    <option value="10:00 Hrs">10:00</option>
                    <option value="11:20 Hrs">11:20</option>
                    <option value="12:35 Hrs">12:35</option>
                    <option value="15:00 Hrs">15:00</option>
                    <option value="16:30 Hrs">16:30</option>
                    <option value="17:50 Hrs">17:50</option>
                </select>
            </div>

            <button onclick="agendarServico()" id="btn-agendar"><i class="fa-solid fa-calendar-check"></i> Confirmar Agendamento</button>
        </div>

        <!-- Comprovante -->
        <div id="nota-fiscal" class="hidden nota-fiscal fade-in">
            <h3><i class="fa-solid fa-circle-check"></i> Agendamento Confirmado</h3>
            
            <div id="aviso-resgate" style="background:#eafaf1; color: var(--success); padding: 10px; border-radius: 8px; font-weight: 600; font-size: 12px; text-align: center; display:none; margin-bottom: 15px;">
                <i class="fa-solid fa-tag"></i> Desconto Score Solicitado!
            </div>
            
            <div class="ticket-row">
                <span>Data</span> <span id="nota-data"></span>
            </div>
            <div class="ticket-row">
                <span>Horário</span> <span id="nota-hora"></span>
            </div>
            <div class="ticket-row">
                <span>Serviço</span> <span id="nota-serv"></span>
            </div>
            <div class="ticket-row" style="border-bottom: none; font-size: 16px; margin-top: 10px;">
                <span>Valor a pagar</span> <span style="color: var(--primary);">R$ <span id="nota-valor"></span></span>
            </div>
        </div>
        
        <button class="btn-logout" onclick="location.reload()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair da conta</button>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO NOCODB ---
    const TOKEN = "D8NVVp7hEJE2X6cD4cdRwuhHtR9tnX3lzOT2QtnE";
    const URL_CADASTRO = "https://app.nocodb.com/api/v2/tables/measzir7yghqdl9/records";
    const URL_AGENDAMENTO = "https://app.nocodb.com/api/v2/tables/mvv28fo6ld6xnq9/records";

    let SALDO_ATUAL = 0;
    let QUER_USAR_SCORE = "Não";
    let USUARIO_LOGADO = null;

    // MÁSCARA AUTOMÁTICA WHATSAPP
    document.getElementById('cad-whatsapp').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 11) v = v.substring(0, 11);
        if (v.length > 10) {
            e.target.value = "(" + v.substring(0, 2) + ") " + v.substring(2, 7) + "-" + v.substring(7);
        } else if (v.length > 6) {
            e.target.value = "(" + v.substring(0, 2) + ") " + v.substring(2, 6) + "-" + v.substring(6);
        } else if (v.length > 2) {
            e.target.value = "(" + v.substring(0, 2) + ") " + v.substring(2);
        } else { e.target.value = v; }
    });

    async function logar() {
        const email = document.getElementById('login-email').value.trim().toLowerCase();
        const senha = document.getElementById('login-senha').value;
        const btn = document.querySelector('#tela-login button');
        
        if(!email || !senha) return alert("Preencha email e senha.");

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Carregando...';

        try {
            const res = await fetch(`${URL_CADASTRO}?limit=100`, { headers: { "xc-token": TOKEN } });
            const data = await res.json();
            const user = data.list.find(u => String(u.email).toLowerCase() === email && String(u.senha) === senha);
            
            if (user) {
                USUARIO_LOGADO = user;
                SALDO_ATUAL = parseFloat(user.saldo) || 0;
                document.getElementById('nome-display').innerText = user.nome.toUpperCase();
                document.getElementById('saldo-texto').innerText = "R$ " + SALDO_ATUAL.toFixed(2).replace('.', ',');
                
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('tela-painel').classList.remove('hidden');
                
                carregarDomingos();
                verificarAgendamentoAtivo(email);
            } else { 
                alert("E-mail ou senha incorretos!"); 
                btn.innerHTML = 'Entrar <i class="fa-solid fa-arrow-right"></i>';
            }
        } catch (e) { 
            alert("Erro ao conectar ao servidor. Tente novamente."); 
            btn.innerHTML = 'Entrar <i class="fa-solid fa-arrow-right"></i>';
        }
    }

    async function bloquearHorariosOcupados() {
        const dataEscolhida = document.getElementById('select-domingo').value;
        const selectHora = document.getElementById('select-horario');
        if(!dataEscolhida) return;

        for(let i = 0; i < selectHora.options.length; i++) {
            let opt = selectHora.options[i];
            if(opt.value === "") continue;
            opt.disabled = false; 
            opt.text = opt.value.replace(' Hrs', ''); 
            opt.style.color = "";
        }

        try {
            const res = await fetch(`${URL_AGENDAMENTO}?limit=100`, { headers: { "xc-token": TOKEN } });
            const data = await res.json();
            const ocupados = data.list.filter(ag => String(ag.data_domingo) === dataEscolhida && ag.status === "Pendente");

            ocupados.forEach(ag => {
                for(let i = 0; i < selectHora.options.length; i++) {
                    if(selectHora.options[i].value === ag.horario) {
                        selectHora.options[i].disabled = true;
                        selectHora.options[i].text = ag.horario.replace(' Hrs', '') + " (Ocupado)";
                        selectHora.options[i].style.color = "#e74c3c";
                    }
                }
            });
        } catch(e) { console.error("Erro ao verificar horários."); }
    }

    function toggleResgate() {
        if (SALDO_ATUAL < 1.00) { alert("Você precisa ter no mínimo R$ 1,00 para usar o saldo."); return; }
        const card = document.getElementById('card-saldo');
        const btn = document.getElementById('btn-resgate');
        if (QUER_USAR_SCORE === "Não") {
            QUER_USAR_SCORE = "Sim";
            card.classList.add('active-resgate');
            btn.innerHTML = '<i class="fa-solid fa-xmark"></i> CANCELAR USO';
            btn.classList.add('cancelar');
        } else {
            QUER_USAR_SCORE = "Não";
            card.classList.remove('active-resgate');
            btn.innerHTML = '<i class="fa-solid fa-gift"></i> USAR NO AGENDAMENTO';
            btn.classList.remove('cancelar');
        }
    }

    async function agendarServico() {
        const serv = document.getElementById('select-servico').value;
        const hora = document.getElementById('select-horario').value;
        const dataD = document.getElementById('select-domingo').value;
        if(!serv || !hora || !dataD) return alert("Por favor, preencha todos os campos do agendamento.");

        const btn = document.getElementById('btn-agendar');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Agendando...';
        btn.disabled = true;

        const[nomeS, valorS, scoreS] = serv.split('|');

        const body = {
            cliente_email: USUARIO_LOGADO.email,
            servico: nomeS,
            horario: hora,
            valor_servico: parseFloat(valorS),
            score_pendente: parseFloat(scoreS),
            status: "Pendente",
            data_domingo: dataD,
            usar_score: QUER_USAR_SCORE
        };

        try {
            const res = await fetch(URL_AGENDAMENTO, {
                method: "POST",
                headers: { "xc-token": TOKEN, "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            if(res.ok) {
                location.reload();
            }
        } catch (e) { 
            alert("Erro ao agendar. Tente novamente.");
            btn.innerHTML = '<i class="fa-solid fa-calendar-check"></i> Confirmar Agendamento';
            btn.disabled = false;
        }
    }

    function carregarDomingos() {
        const select = document.getElementById('select-domingo');
        select.innerHTML = '<option value="">Selecione a Data</option>';
        let data = new Date();
        let domingosEncontrados = 0;
        if(data.getDay() === 0) { adicionarOpcaoData(select, data); domingosEncontrados++; }
        while (domingosEncontrados < 4) {
            data.setDate(data.getDate() + 1);
            if (data.getDay() === 0) { adicionarOpcaoData(select, data); domingosEncontrados++; }
        }
    }

    function adicionarOpcaoData(select, data) {
        let d = String(data.getDate()).padStart(2, '0');
        let m = String(data.getMonth() + 1).padStart(2, '0');
        let dataFormatada = `${d}/${m}/${data.getFullYear()}`;
        select.add(new Option(dataFormatada, dataFormatada));
    }

    async function verificarAgendamentoAtivo(email) {
        try {
            const res = await fetch(`${URL_AGENDAMENTO}?limit=100`, { headers: { "xc-token": TOKEN } });
            const data = await res.json();
            const ativo = data.list.find(ag => String(ag.cliente_email).toLowerCase() === email.toLowerCase() && ag.status === "Pendente");
            
            if(ativo) {
                document.getElementById('area-agendamento').classList.add('hidden');
                document.getElementById('nota-fiscal').classList.remove('hidden');
                
                document.getElementById('nota-data').innerText = ativo.data_domingo;
                document.getElementById('nota-hora').innerText = ativo.horario;
                document.getElementById('nota-serv').innerText = ativo.servico;
                document.getElementById('nota-valor').innerText = parseFloat(ativo.valor_servico).toFixed(2).replace('.', ',');
                
                if(ativo.usar_score === "Sim") document.getElementById('aviso-resgate').style.display = "block";
            }
        } catch(e) {}
    }

    async function finalizarCadastro() {
        const nome = document.getElementById('cad-nome').value;
        const email = document.getElementById('cad-email').value.trim().toLowerCase();
        const senha = document.getElementById('cad-senha').value;
        const whatsapp = document.getElementById('cad-whatsapp').value;
        
        if(!nome || !email || !senha || whatsapp.length < 14) return alert("Por favor, preencha todos os campos corretamente.");

        const btn = document.querySelector('#tela-cadastro button');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Criando conta...';
        btn.disabled = true;

        const body = { nome, email, senha, whatsapp, saldo: 0 };

        try {
            const res = await fetch(URL_CADASTRO, {
                method: "POST",
                headers: { "xc-token": TOKEN, "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            if(res.ok) {
                alert("Conta criada com sucesso! Faça login para continuar."); 
                irParaLogin();
            }
        } catch (e) { 
            alert("Erro ao criar conta."); 
            btn.innerHTML = 'Finalizar Cadastro';
            btn.disabled = false;
        }
    }

    function irParaCadastro() { 
        document.getElementById('tela-login').classList.add('hidden'); 
        document.getElementById('tela-cadastro').classList.remove('hidden'); 
    }
    
    function irParaLogin() { 
        document.getElementById('tela-cadastro').classList.add('hidden'); 
        document.getElementById('tela-login').classList.remove('hidden'); 
        // Reseta o botão caso venha de um erro
        document.querySelector('#tela-cadastro button').innerHTML = 'Finalizar Cadastro';
        document.querySelector('#tela-cadastro button').disabled = false;
    }
</script>
</body>
</html>
